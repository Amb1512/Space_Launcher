<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Mission Login</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #000;
        color: white;
    }

    header {
        background: #0b0f2a;
        text-align: center;
        padding: 20px;
        font-size: 28px;
        font-weight: bold;
    }

    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 80vh;
    }

    .login-box {
        background: #111;
        padding: 40px;
        border-radius: 15px;
        width: 320px;
        text-align: center;
        box-shadow: 0 0 20px #00ffff;
    }

    .login-box h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
        background: #ddd;
        color: #000;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
        background: #00d4d4;
        color: #000;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #00ffff;
    }

    .forgot {
        margin-top: 10px;
        display: block;
        color: #00ffff;
        cursor: pointer;
        font-size: 14px;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #aaa;
    }

    .hidden {
        display: none;
    }
</style>
</head>

<body>

<header>🚀 Space Mission Management System</header>

<div class="container">
    <div class="login-box" id="loginBox">
        <h2>Login</h2>

        <input type="text" id="astroId" placeholder="Astronaut ID">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Launch Login 🚀</button>

        <span class="forgot" onclick="showForgot()">Forgot Password?</span>

        <div class="footer">Authorized Personnel Only</div>
    </div>

    <!-- Forgot Password Box -->
    <div class="login-box hidden" id="forgotBox">
        <h2>Reset Password</h2>

        <input type="text" id="resetId" placeholder="Enter Astronaut ID">
        <input type="password" id="newPassword" placeholder="New Password">

        <button onclick="resetPassword()">Reset Password</button>

        <span class="forgot" onclick="goBack()">← Back to Login</span>
    </div>
</div>

<script>
    function login() {
        let id = document.getElementById("astroId").value;
        let pass = document.getElementById("password").value;

        if (id === "" || pass === "") {
            alert("Please fill all fields!");
        } else {
            alert("🚀 Login Successful (Demo)");
        }
    }

    function showForgot() {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("forgotBox").classList.remove("hidden");
    }

    function goBack() {
        document.getElementById("forgotBox").classList.add("hidden");
        document.getElementById("loginBox").classList.remove("hidden");
    }

    function resetPassword() {
        let id = document.getElementById("resetId").value;
        let newPass = document.getElementById("newPassword").value;

        if (id === "" || newPass === "") {
            alert("Fill all fields!");
        } else {
            alert("Password reset successful (Demo)");
            goBack();
        }
    }
</script>

</body>
</html>
